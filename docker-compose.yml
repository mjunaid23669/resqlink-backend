services:
  postgres:
    image: postgres:16
    container_name: resqlink_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: resqlink
      POSTGRES_DB: resqlink_db
    ports:
      - "5432:5432"
    volumes:
      - resqlink_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: resqlink_redis
    ports:
      - "6379:6379"

volumes:
  resqlink_pgdata:
